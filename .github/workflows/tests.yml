name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install package
      run: pip install -e ".[dev]"
    - name: Run tests
      run: pytest tests/unit -v --ignore=tests/unit/test_gromacs_gmx_energy_trace.py --ignore=tests/unit/test_gromacs_get_energy_menu.py
